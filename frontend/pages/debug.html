<section class="p-6 h-full flex flex-col space-y-6 animate-page-enter">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Console de Depuração</h2>
            <p class="text-slate-400 text-xs">Monitoramento em tempo real do SoundMaster Engine & IA</p>
        </div>
        <div class="flex space-x-2">
            <button id="btn-clear-logs" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px] font-bold uppercase transition">Limpar Log</button>
            <button id="btn-copy-logs" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px] font-bold uppercase transition">Copiar Tudo</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow overflow-hidden">
        
        <!-- Lista de Logs Principal -->
        <div class="lg:col-span-2 flex flex-col bg-slate-900/50 rounded-2xl border border-white/5 overflow-hidden">
            <div class="bg-slate-800/50 px-4 py-2 border-b border-white/5 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500">Live Stream</span>
                <div class="flex items-center space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="filter-python" checked class="w-3 h-3 rounded bg-slate-800 border-white/10 text-cyan-500">
                        <span class="text-[10px] text-slate-400">Python AI</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="filter-system" checked class="w-3 h-3 rounded bg-slate-800 border-white/10 text-emerald-500">
                        <span class="text-[10px] text-slate-400">System</span>
                    </label>
                </div>
            </div>
            
            <div id="log-container" class="flex-grow overflow-y-auto p-4 font-mono text-[11px] space-y-1 bg-black/20">
                <!-- Logs dinâmicos aqui -->
                <div class="text-slate-500 opacity-50 italic">Aguardando eventos do sistema...</div>
            </div>
        </div>

        <!-- Painel de Status & Testes -->
        <div class="space-y-6 overflow-y-auto pr-2">
            
            <!-- Status do Servidor -->
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Status da Pilha</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-500">Node.js API</span>
                        <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-500">Python Engine</span>
                        <span id="status-python-dot" class="w-2 h-2 rounded-full bg-slate-600"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-500">Socket Bridge</span>
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    </div>
                </div>
            </div>

            <!-- Testes Rápidos -->
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Ferramentas</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button id="btn-test-ai" class="w-full py-2.5 bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border border-cyan-500/20 rounded-xl text-[10px] font-black uppercase transition">Ping AI Engine</button>
                    <button id="btn-test-db" class="w-full py-2.5 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 rounded-xl text-[10px] font-black uppercase transition">Check Database</button>
                    <button id="btn-force-gc" class="w-full py-2.5 bg-slate-700/30 hover:bg-slate-700/50 text-slate-400 border border-white/5 rounded-xl text-[10px] font-black uppercase transition">Limpar Memória UI</button>
                </div>
            </div>

            <!-- Info de Memória -->
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-2 tracking-widest">Performance</h3>
                <div class="text-[10px] text-slate-500 space-y-1">
                    <p>Uso de Heap: <span id="debug-mem-heap" class="text-slate-300">-- MB</span></p>
                    <p>Uptime: <span id="debug-uptime" class="text-slate-300">--:--:--</span></p>
                </div>
            </div>

        </div>
    </div>
</section>

<script>
(function() {
    const logContainer = document.getElementById('log-container');
    const statusPythonDot = document.getElementById('status-python-dot');
    
    // Conecta ao Socket para receber logs em tempo real
    if (window.socket) {
        window.socket.on('system_log', (entry) => {
            appendLog(entry);
            
            // Atualiza status do Python se o log vier dele
            if (entry.socketId === 'PYTHON') {
                statusPythonDot.classList.replace('bg-slate-600', 'bg-cyan-500');
                statusPythonDot.classList.add('shadow-[0_0_8px_rgba(6,182,212,0.5)]');
            }
        });
    }

    function appendLog(entry) {
        // Filtros
        const showPython = document.getElementById('filter-python').checked;
        const showSystem = document.getElementById('filter-system').checked;
        
        if (entry.socketId === 'PYTHON' && !showPython) return;
        if (entry.socketId === 'SYSTEM' && !showSystem) return;

        const time = new Date(entry.timestamp).toLocaleTimeString();
        const levelClass = entry.level === 'ERROR' ? 'text-red-500' : (entry.level === 'WARN' ? 'text-amber-500' : 'text-slate-400');
        const sourceColor = entry.socketId === 'PYTHON' ? 'text-cyan-500' : 'text-emerald-500';
        
        const row = document.createElement('div');
        row.className = 'border-l-2 border-transparent hover:bg-white/5 px-2 py-0.5 transition-all';
        if (entry.level === 'ERROR') row.style.borderLeftColor = '#ef4444';
        
        row.innerHTML = `
            <span class="text-slate-600 text-[9px] mr-2">${time}</span>
            <span class="${levelClass} font-bold mr-2 text-[9px]">[${entry.level}]</span>
            <span class="${sourceColor} font-bold mr-2 uppercase">[${entry.socketId}]</span>
            <span class="text-slate-300">${entry.event}:</span>
            <span class="text-slate-400 ml-1">${typeof entry.data === 'string' ? entry.data : JSON.stringify(entry.data)}</span>
        `;
        
        logContainer.appendChild(row);
        
        // Auto-scroll
        if (logContainer.scrollHeight - logContainer.scrollTop < 500) {
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // Limite de logs na memória da página
        if (logContainer.children.length > 500) logContainer.removeChild(logContainer.firstChild);
    }

    // Ações
    document.getElementById('btn-clear-logs').onclick = () => logContainer.innerHTML = '';
    document.getElementById('btn-copy-logs').onclick = () => {
        const text = Array.from(logContainer.innerText).join('');
        navigator.clipboard.writeText(text);
        alert('Logs copiados!');
    };

    document.getElementById('btn-test-ai').onclick = async () => {
        try {
            const res = await fetch('/api/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'ping' })
            });
            const data = await res.json();
            console.log('[Debug] AI Respondeu:', data);
        } catch(e) {
            console.error('[Debug] Falha ao pingar AI:', e);
        }
    };

    // Update de performance simulado
    setInterval(() => {
        const mem = Math.round(performance.memory ? performance.memory.usedJSHeapSize / 1024 / 1024 : 0);
        document.getElementById('debug-mem-heap').innerText = mem + ' MB';
    }, 2000);

})();
</script>

<style>
#log-container::-webkit-scrollbar { width: 4px; }
#log-container::-webkit-scrollbar-track { background: transparent; }
#log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
