<section class="p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">

            <div>

                <p class="text-slate-400 font-medium">Controle dos 24 canais e processamento IA</p>
            </div>
        </div>

        <div class="flex items-center gap-4 bg-slate-900/60 p-4 rounded-2xl border border-white/10 shadow-xl">
            <div class="flex flex-col">
                <span class="text-[9px] uppercase font-black text-slate-500 mb-1">Alvo do Mix (Faders):</span>
                <select id="mixer-target-select" class="bg-transparent text-cyan-400 font-black focus:outline-none cursor-pointer uppercase text-xs">

                    <option value="aux1" class="bg-slate-900">Monitor 1 (Pastor)</option>

                    <option value="aux4" class="bg-slate-900">Monitor 4 (Vocal 2)</option>
                    <option value="aux5" class="bg-slate-900">Monitor 5 (Piano)</option>
                    <option value="aux6" class="bg-slate-900">Monitor 6 (Bateria)</option>
                    <option value="aux7" class="bg-slate-900">Monitor 7 (Guit 1)</option>
                    <option value="aux8" class="bg-slate-900">Monitor 8 (Guit 2)</option>
                    <option value="aux9" class="bg-slate-900">Monitor 9 (Side L)</option>
                    <option value="aux10" class="bg-slate-900">Monitor 10 (Side R)</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Console de Canais -->
    <div class="bg-slate-900/60 border border-white/10 rounded-3xl p-6 shadow-2xl overflow-x-auto">
        <div id="mixer-channels-container" class="flex gap-4 min-w-[1200px]">

            <div class="flex-1 flex gap-4 opacity-30 italic text-slate-600 items-center justify-center text-xs py-20">

            </div>
        </div>
