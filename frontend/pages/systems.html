<section class="p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <header class="mb-12">
        <div class="flex items-center gap-4 mb-4">
            <span class="p-3 bg-slate-800 rounded-2xl text-2xl">🌐</span>
            <div>
                <h2 class="text-3xl font-black text-white tracking-tighter">Sistemas & Conectividade</h2>
                <p class="text-slate-400 font-medium">Gestão de IP, rede e infraestrutura do servidor</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Conexão Ui24R -->
        <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-6 shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Mesa de Som (Ui24R)</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Endereço IP da Mesa</label>
                    <div class="flex gap-2">
                        <input type="text" id="mixer-ip-input" class="bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm flex-1 focus:border-cyan-500/50 outline-none transition-all" placeholder="ex: 10.10.1.1">
                        <button id="btn-reconnect-mixer" class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-xs font-black uppercase tracking-wider transition-all">
                            Conectar
                        </button>
                    </div>
                </div>
                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-slate-400">Modelo Detectado</span>
                        <span id="mixer-model-display" class="text-xs font-black text-cyan-400 uppercase tracking-widest">Aguardando...</span>
                    </div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-slate-400">Versão Firmware</span>
                        <span id="mixer-fw-display" class="text-xs font-mono text-slate-300">---</span>
                    </div>
                    <div id="mixer-caps-container" class="mt-3 pt-3 border-t border-white/5 grid grid-cols-3 gap-2 text-center">
                        <div class="flex flex-col">
                            <span class="text-[8px] text-slate-500 uppercase">Canais</span>
                            <span id="cap-ch" class="text-xs font-bold text-white">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[8px] text-slate-500 uppercase">Aux</span>
                            <span id="cap-aux" class="text-xs font-bold text-white">-</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[8px] text-slate-500 uppercase">FX</span>
                            <span id="cap-fx" class="text-xs font-bold text-white">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Túnel e Mobile -->
        <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-6 shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Status do Servidor & Túnel</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-black/40 rounded-xl border border-white/5">
                    <div>
                        <span class="text-xs text-slate-300 block font-bold mb-1">Acesso Externo (Túnel)</span>
                        <span id="tunnel-status-text" class="text-[10px] text-slate-500 font-mono">Desativado</span>
                    </div>
                    <div id="tunnel-led" class="w-3 h-3 rounded-full bg-slate-700"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-toggle-tunnel" class="py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-[10px] font-black uppercase tracking-wider transition-all shadow-lg shadow-cyan-900/30">
                        Ativar Túnel
                    </button>
                    <button id="btn-copy-link" class="py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border border-white/5">
                        Copiar Link
                    </button>
                </div>
            </div>
        </div>
    </div>
<script>
    (function() {
        const btnToggle = document.getElementById('btn-toggle-tunnel');
        const btnCopy = document.getElementById('btn-copy-link');
        const statusText = document.getElementById('tunnel-status-text');
        const led = document.getElementById('tunnel-led');
        let currentUrl = '';

        async function updateStatus() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                if (config.tunnelUrl) {
                    currentUrl = config.tunnelUrl;
                    statusText.innerText = currentUrl;
                    statusText.classList.replace('text-slate-500', 'text-cyan-400');
                    led.classList.replace('bg-slate-700', 'bg-green-500');
                    led.classList.add('shadow-lg', 'shadow-green-900/50');
                    btnToggle.innerText = 'Túnel Ativo';
                    btnToggle.classList.replace('bg-cyan-600', 'bg-slate-700');
                }
            } catch (e) {}
        }

        btnToggle?.addEventListener('click', async () => {
            btnToggle.innerText = 'Iniciando...';
            try {
                const res = await fetch('/api/tunnel/toggle', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    setTimeout(updateStatus, 3000);
                }
            } catch (e) {
                btnToggle.innerText = 'Erro ao Ativar';
            }
        });

        btnCopy?.addEventListener('click', () => {
            if (currentUrl) {
                navigator.clipboard.writeText(currentUrl);
                alert('Link copiado: ' + currentUrl);
            } else {
                alert('Ative o túnel primeiro!');
            }
        });

        // Atualização de dados da mesa
        const modelDisplay = document.getElementById('mixer-model-display');
        const fwDisplay = document.getElementById('mixer-fw-display');
        const capCh = document.getElementById('cap-ch');
        const capAux = document.getElementById('cap-aux');
        const capFx = document.getElementById('cap-fx');

        AppStore.subscribe('deviceInfo', (info) => {
            if (!info || info.model === 'Unknown') return;
            
            if (modelDisplay) modelDisplay.innerText = info.model;
            if (fwDisplay) fwDisplay.innerText = info.firmware;
            
            if (info.caps) {
                if (capCh) capCh.innerText = info.caps.inputs || '-';
                if (capAux) capAux.innerText = info.caps.aux || '-';
                if (capFx) capFx.innerText = info.caps.fx || '-';
            }
        });

        updateStatus();
    })();
</script>
