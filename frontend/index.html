<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Pro - Acoustic Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/app-layout.css">
</head>
<body>

    <div class="app-shell">

        <!-- Sidebar Container (Icon Rail + Category Panel) -->
        <div id="app-sidebar" style="display:flex; flex-shrink:0; z-index:30;">
            <!-- Loaded via js/app.js -->
        </div>

        <!-- Main Area (Header + Content + Mixer) -->
        <div class="main-area">

            <!-- Global Header -->
            <header class="app-header">
                <div class="header-left">
                    <button id="btn-toggle-sidebar" class="header-btn" title="Alternar Menu">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>

                    <div class="header-breadcrumb">
                        <span class="breadcrumb-category" id="breadcrumb-category"></span>
                        <span class="breadcrumb-sep" id="breadcrumb-sep" style="display:none;">›</span>
                        <span class="breadcrumb-page" id="breadcrumb-page">Dashboard</span>
                    </div>

                    <button class="header-status" id="btn-toggle-mic" title="Ligar/Desligar Microfone">
                        <div class="status-dot" id="mic-status-dot"></div>
                        <span class="status-text" id="mic-status-text">Mic Offline</span>
                    </button>
                </div>

                <div class="header-right">
                    <button id="btn-toggle-sim" class="header-btn" title="Simulação" style="display:none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    </button>
                    <button id="btn-help" class="header-btn" title="Ajuda">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    </button>
                    <button id="btn-toggle-main" class="header-btn" title="Esconder Centro">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                    </button>
                    <button id="btn-toggle-mixer" class="header-btn header-toggle-mixer" title="Mixer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg>
                        <span id="txt-toggle-mixer">Mixer</span>
                    </button>
                </div>
            </header>

            <!-- Content Viewport -->
            <div class="content-viewport">
                <!-- Central View -->
                <main id="app-main">
                    <div id="agent-workspace">
                        <!-- Page content loaded here by Router -->
                    </div>
                </main>

                <!-- Mixer Panel -->
                <aside id="app-mixer">
                    <!-- Loaded via js/app.js -->
                </aside>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Core & Store -->
    <script src="js/store/app.store.js"></script>
    <script src="js/core/router.js"></script>

    <!-- Services -->
    <script src="js/services/socket.service.js"></script>
    <script src="js/services/mixer.service.js"></script>
    <script src="js/services/ai.service.js"></script>
    <script src="js/services/updater.service.js"></script>
    <script src="js/services/spl-logger.service.js"></script>
    <script src="js/services/mtw-manager.service.js"></script>
    <script src="js/services/auto-eq.service.js"></script>
    <script src="js/services/spatial-averager.service.js"></script>
    <script src="js/services/onboarding.service.js"></script>
    <script src="js/services/automixer.service.js"></script>
    <script src="js/services/scene-builder.service.js"></script>
    <script src="js/services/volunteer-mode.js"></script>
    <script src="js/services/simulation.service.js"></script>

    <!-- Logic Modules -->
    <script src="js/data.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/church-tools.js"></script>
    <script src="js/mappings.js"></script>
    <script src="js/calibration.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/layout.js"></script>

    <!-- UI Components -->
    <script src="js/ui/mixer-panel.ui.js"></script>
    <script src="js/ui/mixer-pages.ui.js"></script>
    <script src="js/ui/tf-visualizer.js"></script>
    <script src="js/ui/ai-chat.ui.js"></script>

    <!-- App Entry Point -->
    <script src="js/app.js"></script>
</body>
</html>
