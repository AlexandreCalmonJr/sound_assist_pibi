<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Pro - Acoustic Intelligence</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#09090b] text-slate-200 overflow-hidden h-screen flex">

    <!-- Sidebar / Navigation -->
    <aside id="app-sidebar" class="w-72 border-r border-white/5 flex flex-col bg-[#0c0c0e] z-20 transition-all duration-300">
        <!-- Carregado via js/app.js -->
    </aside>

    <!-- Main Container (Header + Content) -->
    <div class="flex-1 flex flex-col min-w-0">
        
        <!-- Global Header -->
        <header class="h-16 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-md flex items-center justify-between px-6 z-30 shrink-0">
            <div class="flex items-center gap-4">
                <button id="btn-toggle-sidebar" class="p-2 hover:bg-white/5 rounded-lg transition-all text-slate-400 hover:text-white" title="Alternar Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="h-4 w-px bg-white/10 mx-2"></div>
                <h2 id="page-title" class="text-xs font-black uppercase tracking-widest text-slate-500">Dashboard</h2>
                <div class="flex items-center gap-2 px-3 py-1 bg-black/40 rounded-full border border-white/5 ml-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600" id="mic-status-dot"></div>
                    <span class="text-[10px] font-bold uppercase text-slate-400" id="mic-status-text">Mic Offline</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="btn-toggle-main" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all border border-white/5 flex items-center gap-2">
                    <span>🖥️</span> <span id="txt-toggle-main">Esconder Centro</span>
                </button>
                <div class="h-4 w-px bg-white/10 mx-1"></div>
                <button id="btn-toggle-mixer" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg text-[10px] font-black uppercase tracking-wider transition-all shadow-lg shadow-cyan-900/20 flex items-center gap-2">
                    <span>🎚️</span> <span id="txt-toggle-mixer">Esconder Mixer</span>
                </button>
            </div>
        </header>

        <!-- Viewport Area (Main Content + Mixer) -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Central View -->
            <main id="app-main" class="flex-1 overflow-y-auto p-8 transition-all duration-300">
                <div id="agent-workspace">
                    <!-- Conteúdo das páginas carregado aqui -->
                </div>
            </main>

            <!-- Mixer Panel -->
            <aside id="app-mixer" class="w-[400px] border-l border-white/5 bg-[#0c0c0e] flex flex-col transition-all duration-300">
                <!-- Carregado via js/app.js -->
            </aside>
        </div>
    </div>

    <!-- Scripts - Ordem Crítica -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Core & Store -->
    <script src="js/store/app.store.js"></script>
    <script src="js/core/router.js"></script>

    <!-- Services -->
    <script src="js/services/socket.service.js"></script>
    <script src="js/services/mixer.service.js"></script>
    <script src="js/services/ai.service.js"></script>

    <!-- Logic Modules -->
    <script src="js/data.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/church-tools.js"></script>
    <script src="js/mappings.js"></script>
    <script src="js/calibration.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/layout.js"></script>

    <!-- UI Components -->
    <script src="js/ui/mixer-panel.ui.js"></script>
    <script src="js/ui/ai-chat.ui.js"></script>

    <!-- App Entry Point -->
    <script src="js/app.js"></script>
</body>
</html>
