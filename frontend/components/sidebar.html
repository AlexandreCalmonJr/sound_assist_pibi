<!-- Icon Rail -->
<div class="icon-rail">

        <div class="rail-logo">SM</div>
        <nav>

                <span class="rail-tooltip">Dashboard</span>
            </button>

            <div class="rail-divider"></div>

            <!-- Medir -->
            <button class="rail-btn" data-category="measure" title="Medir">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span class="rail-tooltip">Analisar</span>
            </button>

            <!-- Mixer -->
            <button class="rail-btn" data-category="mixer" title="Mixer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>

    <div class="rail-bottom">
        <div class="rail-divider"></div>

        <!-- Assistente IA (direct link) -->
        <button class="rail-btn" data-target="ai-chat" data-direct="true" title="Assistente IA" style="color: var(--accent);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
            <span class="rail-tooltip">Assistente IA</span>
        </button>

        <!-- Modo Voluntário (direct link) -->
        <button class="rail-btn" data-target="volunteer-mode" data-direct="true" title="Modo Voluntário">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

        </button>

        <!-- Testbed (direct link) -->
        <button class="rail-btn" data-target="testbed" data-direct="true" title="Testbed">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span class="rail-tooltip">Testbed</span>
        </button>

</div>

<!-- Category Panel (Expandable flyout) -->

    <div class="panel-header">
        <h3 class="panel-title" id="panel-title">Medir</h3>
    </div>
    <nav class="panel-nav" id="panel-nav">
        <!-- Items injected dynamically by layout.js -->
    </nav>
</div>
