<section class="p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <header class="mb-12">
        <div class="flex items-center gap-4 mb-4">
            <span class="p-3 bg-cyan-900/40 rounded-2xl text-2xl">🌐</span>
            <div>
                <h2 class="text-3xl font-black text-white tracking-tighter">Saúde de Cabos (AES67)</h2>
                <p class="text-slate-400 font-medium">Telemetria de rede e monitoramento de canais via RTP</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Status da Rede -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-6 shadow-2xl">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Status do Receptor</h3>
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm text-slate-300">Porta RTP</span>
                    <span class="px-3 py-1 bg-black rounded-lg text-xs font-mono text-cyan-400 border border-cyan-500/30">5004</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm text-slate-300">Sincronismo PTP</span>
                    <span class="flex items-center gap-2 text-green-400 text-xs font-bold uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Lock
                    </span>
                </div>
            </div>

            <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-6 shadow-2xl">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Diagnóstico IA</h3>
                <div id="aes67-ai-alerts" class="space-y-3">
                    <div class="p-4 bg-black/40 rounded-xl border border-white/5 text-[11px] text-slate-400 italic">
                        Inicie o monitoramento para detectar ruído de 60Hz ou perdas de pacote.
                    </div>
                </div>
            </div>
        </div>

        <!-- Canais Monitorados -->
        <div class="lg:col-span-2">
            <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-6 shadow-2xl h-full">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">Meters Multi-Canal (AES67)</h3>
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">32 Canais Ativos</span>
                </div>
                
                <!-- Grade de Meters -->
                <div class="grid grid-cols-8 gap-4 h-[400px]">
                    <!-- Exemplo de Meter (Gerado via JS em uso real) -->
                    <div class="flex flex-col items-center gap-2">
                        <div class="flex-1 w-3 bg-slate-800 rounded-full relative overflow-hidden">
                            <div class="absolute bottom-0 w-full bg-gradient-to-t from-green-500 via-yellow-500 to-red-500 h-[60%]"></div>
                        </div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Ch 1</span>
                    </div>
                    <!-- Repetir conforme necessário -->
                    <div class="flex flex-col items-center gap-2">
                        <div class="flex-1 w-3 bg-slate-800 rounded-full relative overflow-hidden">
                            <div class="absolute bottom-0 w-full bg-gradient-to-t from-green-500 via-yellow-500 to-red-500 h-[45%]"></div>
                        </div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Ch 2</span>
                    </div>
                    <!-- Placeholders para demonstrar a grade -->
                    <div class="flex flex-col items-center gap-2 opacity-30">
                        <div class="flex-1 w-3 bg-slate-800 rounded-full"></div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">...</span>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-white/5 flex justify-end gap-3">
                    <button class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-black uppercase tracking-wider transition-all">
                        Reiniciar Stream
                    </button>
                    <button class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-xs font-black uppercase tracking-wider transition-all shadow-lg shadow-cyan-900/30">
                        Ativar Varredura IA
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
