<section id="rt60" class="module page-section">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-white">Calculadora Acústica</h2>
        <p class="text-slate-400 text-sm">Insira as dimensões do salão para calcular a reverberação e o Delay das caixas auxiliares.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="space-y-6 bg-slate-800/40 border border-white/10 rounded-2xl p-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Comprimento (m)</label>
                    <input type="number" id="rt-length" value="20" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Largura (m)</label>
                    <input type="number" id="rt-width" value="10" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Altura (m)</label>
                    <input type="number" id="rt-height" value="5" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Distância PA até Auxiliares (m)</label>
                <input type="number" id="rt-delay-dist" value="10" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all">
                <p class="text-[10px] text-slate-500 mt-1">Deixe em 0 se não houver caixas de reforço.</p>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Nível de Absorção Estimado</label>
                <select id="rt-absorption" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 outline-none transition-all appearance-none">
                    <option value="0.05">Baixa (Piso liso, muito vidro, paredes nuas)</option>
                    <option value="0.15" selected>Média (Cadeiras estofadas, pessoas, algumas cortinas)</option>
                    <option value="0.30">Alta (Carpete, forro acústico, cortinas grossas)</option>
                </select>
            </div>

            <button id="btn-calc-rt60" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl font-bold transition-all shadow-lg shadow-cyan-900/30">Calcular Acústica</button>
        </div>

        <div class="space-y-6">
            <div id="rt60-result" class="hidden animate-in fade-in slide-in-from-bottom-4"></div>
            
            <div id="mapping-container" class="hidden bg-slate-800/40 border border-white/10 rounded-2xl p-6">
                <h3 class="text-lg font-bold text-white mb-2">Mapa Visual de Cobertura</h3>
                <p class="text-xs text-slate-500 mb-4">Clique no mapa para registrar uma análise acústica neste ponto.</p>
                <div class="relative bg-black rounded-lg border border-white/10 overflow-hidden mb-4">
                    <canvas id="mapping-canvas" class="w-full h-auto"></canvas>
                </div>
                <div id="mapping-legend" class="flex justify-center gap-6 text-[10px] uppercase font-bold text-slate-500">
                    <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span> Bom</span>
                    <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-yellow-500"></span> Alerta</span>
                    <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500"></span> Crítico</span>
                </div>
                <button id="btn-clear-mapping" class="w-full mt-6 py-2 border border-white/10 hover:bg-white/5 rounded-lg text-xs font-bold transition-all">Limpar Mapa</button>
            </div>
        </div>
    </div>
</section>
