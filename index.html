<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Pro - Assistente Ui24R</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    
    <!-- Tailwind CSS (Build via CLI) -->
    <link rel="stylesheet" href="css/styles.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        [v-cloak] { display: none; }
        
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>

<body class="bg-[#09090b] text-slate-200 overflow-hidden h-screen flex">
    
    <!-- Sidebar / Navigation -->
    <aside id="app-sidebar" class="w-72 border-r border-white/5 flex flex-col bg-[#0c0c0e] z-20">
        <!-- Carregado via components/sidebar.html -->
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Content Header -->
        <header class="h-16 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-md flex items-center justify-between px-8 z-10">
            <div class="flex items-center gap-4">
                <h2 id="page-title" class="text-sm font-bold uppercase tracking-widest text-slate-500">Dashboard</h2>
                <div class="flex items-center gap-2 px-3 py-1 bg-black/40 rounded-full border border-white/5">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600" id="mic-status-dot"></div>
                    <span class="text-[10px] font-bold uppercase text-slate-400" id="mic-status-text">Mic Offline</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="btn-toggle-mixer" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold transition-all border border-white/5">
                    Ocultar Mixer ➡️
                </button>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="agent-workspace" class="flex-1 overflow-y-auto p-8 transition-opacity duration-300">
            <!-- Carregado via Router -->
            <div class="flex items-center justify-center h-full">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500"></div>
            </div>
        </div>
    </main>

    <!-- Mixer Panel Area -->
    <aside id="app-mixer" class="w-[400px] transition-all duration-500 ease-in-out">
        <!-- Carregado via components/mixer-panel.html -->
    </aside>

    <!-- Scripts Core -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/store/app.store.js"></script>
    <script src="js/services/socket.service.js"></script>
    <script src="js/services/mixer.service.js"></script>
    <script src="js/services/ai.service.js"></script>
    
    <!-- Router & Shell Logic -->
    <script src="js/core/router.js"></script>
    
    <!-- Scripts de Lógica -->
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/analyzer.js"></script>
    <script src="js/mapping-visual.js"></script>
    <script src="js/church-tools.js"></script>
    <script src="js/mappings.js"></script>
    <script src="js/ui/mixer-panel.ui.js"></script>
    <script src="js/ui/ai-chat.ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
